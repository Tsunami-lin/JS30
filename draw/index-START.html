<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>HTML5 Canvas</title>
</head>

<body>
  <canvas id="draw" width="800" height="800"></canvas>
  <script>

    // 画布部署
    const canvas = document.querySelector('#draw')
    const drawpaper = canvas.getContext('2d')

    //控件参数
    let isdraw = false
    let lastx = 0
    let lasty = 0
    let colorchange = 0

    //线条修饰参数
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    drawpaper.strokeStyle = '#BADA55';
    drawpaper.lineJoin = 'round';
    drawpaper.lineCap = 'butt';
    drawpaper.lineWidth = 50;



    function test(testitem) {
      console.log(testitem);

    }
    test(drawpaper)



    function draw(e) {
      if (isdraw) {
        // lastx = e.offsetX
        // lasty = e.offsetY
        [lastx, lasty] = [e.offsetX, e.offsetY]

        colorchange += 0.5
        if (colorchange === 360) {
          colorchange = 0
        }
        test(colorchange)

        drawpaper.strokeStyle = `hsl(${colorchange},100%,50%)`
        drawpaper.beginPath();
        drawpaper.moveTo(lastx, lasty)
        drawpaper.lineTo(e.offsetX, e.offsetY)
        drawpaper.stroke()
      } else {
        return
      }
    }


    canvas.addEventListener('mousemove', draw)
    canvas.addEventListener('mousedown', (e) => {
      isdraw = true
    });
    canvas.addEventListener('mouseup', () => isdraw = false);
    canvas.addEventListener('mouseout', () => isdraw = false);


  </script>

  <style>
    html,
    body {
      margin: 0;
    }
  </style>

</body>

</html>
