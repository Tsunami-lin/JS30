<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Whack A Mole!</title>
  <link href='https://fonts.googleapis.com/css?family=Amatic+SC:400,700' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="https://fav.farm/🔥" />
</head>

<body>

  <h1>Whack-a-mole! <span class="score">0</span></h1>
  <button onClick="startGame()">Start!</button>

  <div class="game">
    <div class="hole hole1">
      <div class="mole"></div>
    </div>
    <div class="hole hole2">
      <div class="mole"></div>
    </div>
    <div class="hole hole3">
      <div class="mole"></div>
    </div>
    <div class="hole hole4">
      <div class="mole"></div>
    </div>
    <div class="hole hole5">
      <div class="mole"></div>
    </div>
    <div class="hole hole6">
      <div class="mole"></div>
    </div>
  </div>

  <script>
    // 地洞的范围
    const holes = document.querySelectorAll('.hole');
    const scoreBoard = document.querySelector('.score');
    const moles = document.querySelectorAll('.mole');

    //需要的基础属性
    let lastHole
    let timeUp = false
    let score = 0

    // 修改特征
    const dataImg = [
      { name: 'mole', image: 'mole.svg', weight: 80 },
      { name: 'churen1', image: 'erji.jpg', weight: 20 },
    ];

    //权重算法 实践 返回的内容===根据权重结果
    // function getWeight() {
    //   //获取总权重
    //   const totalWeight = dataImg.reduce((sum, item) => sum + item.weight)
    //   //权重随机数
    //   const rand = Math.random() * totalWeight
    //   let cumulative = 0

    //   for (const item of dataImg) {
    //     cumulative += item.weight
    //     if (rand < cumulative) {
    //       return item
    //     }
    //   }
    // }


    function getWeight() {
      const totalWeight = dataImg.reduce((sum, item) => sum + item.weight, 0);
      const rand = Math.random() * totalWeight;
      let cumulative = 0;

      for (const item of dataImg) {
        cumulative += item.weight;
        if (rand < cumulative) {
          return item;
        }
      }
      // 万一上面循环没返回，返回最后一个元素作为兜底
      return dataImg[dataImg.length - 1];
    }








    //工具函数 获取在一个范围内的随机数值 这个函数  彩虹二连
    function randomTime(min, max) {
      return Math.round(Math.random() * (max - min) + min)
    }


    function randomHole(holes) {
      // 随机洞穴id
      const idx = Math.floor(Math.random() * holes.length)
      //id给到洞穴数组 确定该次执行的洞穴位置
      const hole = holes[idx]
      if (hole === lastHole) {
        console.log('洞穴位置优化');
        return randomHole(holes)
      }
      //执行后标记
      lastHole = hole
      return hole
    }

    function peep() {
      // 获取一个在200 到 1000中的随机数值
      const time = randomTime(200, 1000)
      const hole = randomHole(holes)
      // 这里根据随机的洞口进行坑内动物匹配 总之就是那么一回事

      const mole = hole.querySelector('.mole')

      const img = getWeight()
      mole.style.backgroundImage = `url(${img.image})`


      hole.classList.add('up')
      setTimeout(() => {
        hole.classList.remove('up')
        if (!timeUp) peep()
      }, time);
    }
    // console.log(randomHole(holes));s

    // peep()



    function startGame() {
      scoreBoard.textContent = 0
      timeUp = false
      score = 0
      peep()
      setTimeout(() => {
        timeUp = true
      }, 10000);
    }

    // 鼠标交互  点击获取数据
    function bonk(e) {
      // 如果不是因为鼠标点击 那么这个数值就不会表示为true
      if (!e.isTrusted) return
      console.log("这里触发了点击事件");
      score++
      this.parentNode.classList.remove('up')
      scoreBoard.textContent = score
    }

    moles.forEach(item => item.addEventListener('click', bonk))
  </script>
</body>

</html>
